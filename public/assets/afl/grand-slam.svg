<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Grand Slam — every trophy won">
  <defs>
    <!-- Bottom year arc (stamped per franchise via stampBadgeYear). -->
    <path id="yearArc" d="M 78.9 251.6 A 124 124 0 0 0 221.1 251.6" fill="none"></path>
    <!-- Top label arc. -->
    <path id="gsTopArc" d="M 55 70.3 A 124 124 0 0 1 245 70.3" fill="none"></path>
    <linearGradient id="gsPlat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"></stop>
      <stop offset="50%" stop-color="#cbd5e1"></stop>
      <stop offset="100%" stop-color="#94a3b8"></stop>
    </linearGradient>
    <linearGradient id="gsGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbe8a6"></stop>
      <stop offset="55%" stop-color="#d4af37"></stop>
      <stop offset="100%" stop-color="#a8842a"></stop>
    </linearGradient>
  </defs>

  <!-- Concentric medallion: platinum outer ring (a tier above the gold-only
       award badges), gold inner ring, navy field. -->
  <circle cx="150" cy="150" r="144" fill="url(#gsPlat)"></circle>
  <circle cx="150" cy="150" r="138" fill="#002244"></circle>
  <circle cx="150" cy="150" r="112" fill="url(#gsGold)"></circle>
  <circle cx="150" cy="150" r="106" fill="#002244"></circle>

  <!-- Bottom year. MUST be the first year-arc text in the document: the badge
       stamper rewrites the first curved year token it finds, so keep the label
       arc below it. (Do not write the textpath tag name in a comment here — the
       stamper's regex would match the comment instead.) -->
  <text dy="5" font-family="'UFC Sans Condensed','Arial Narrow',sans-serif" font-weight="700" font-size="20" letter-spacing="3" fill="#e6c976"><textPath href="#yearArc" startOffset="50%" text-anchor="middle">★  2025  ★</textPath></text>

  <!-- Top label (after the year arc so stamping never overwrites it). -->
  <text font-family="'UFC Sans Condensed','Arial Narrow',sans-serif" font-weight="700" font-size="22" letter-spacing="3" fill="#e6c976"><textPath href="#gsTopArc" startOffset="50%" text-anchor="middle">GRAND SLAM</textPath></text>

  <!-- Crown emblem: every-trophy = "won it all". -->
  <g transform="translate(150,150)">
    <path d="M -50 30 L -50 -14 L -22 6 L 0 -34 L 22 6 L 50 -14 L 50 30 Z" fill="url(#gsGold)" stroke="#a8842a" stroke-width="2"></path>
    <rect x="-56" y="30" width="112" height="16" rx="4" fill="url(#gsGold)" stroke="#a8842a" stroke-width="2"></rect>
    <!-- point jewels -->
    <circle cx="-50" cy="-16" r="6" fill="#c41e3a" stroke="#7f1424" stroke-width="1.5"></circle>
    <circle cx="0" cy="-36" r="7" fill="#c41e3a" stroke="#7f1424" stroke-width="1.5"></circle>
    <circle cx="50" cy="-16" r="6" fill="#c41e3a" stroke="#7f1424" stroke-width="1.5"></circle>
    <!-- band jewels -->
    <circle cx="-28" cy="38" r="5" fill="#002244" stroke="#7a6320" stroke-width="1"></circle>
    <circle cx="0" cy="38" r="6" fill="#c41e3a" stroke="#7f1424" stroke-width="1.5"></circle>
    <circle cx="28" cy="38" r="5" fill="#002244" stroke="#7a6320" stroke-width="1"></circle>
    <!-- crown highlight -->
    <path d="M -50 30 L -50 -14 L -22 6 L 0 -34 L 22 6 L 50 -14 L 50 30 Z" fill="none" stroke="#fff3cf" stroke-width="1" opacity="0.5"></path>
  </g>
</svg>
