<!DOCTYPE html>
<html>
<head><title>Favicon Comparison</title></head>
<body style="margin:0;display:flex;height:100vh;font-family:system-ui">
  <div style="flex:1;background:#121212;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px">
    <h2 style="color:#aaa;margin:0">Dark Background</h2>
    <div style="display:flex;gap:60px;align-items:center">
      <div style="text-align:center">
        <img src="/favicon.svg" width="128" height="128">
        <p style="color:#aaa;margin-top:12px">Blue (#4a9ae5)</p>
      </div>
      <div style="text-align:center">
        <img src="/favicon-white.svg" width="128" height="128">
        <p style="color:#aaa;margin-top:12px">White (#ffffff)</p>
      </div>
    </div>
    <div style="display:flex;gap:60px;align-items:center">
      <div style="text-align:center">
        <img src="/favicon.svg" width="32" height="32">
        <p style="color:#aaa;margin-top:8px;font-size:12px">32px (tab size)</p>
      </div>
      <div style="text-align:center">
        <img src="/favicon-white.svg" width="32" height="32">
        <p style="color:#aaa;margin-top:8px;font-size:12px">32px (tab size)</p>
      </div>
    </div>
  </div>
  <div style="flex:1;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px">
    <h2 style="color:#333;margin:0">Light Background</h2>
    <div style="display:flex;gap:60px;align-items:center">
      <div style="text-align:center">
        <img src="/favicon.svg" width="128" height="128">
        <p style="color:#666;margin-top:12px">Blue (#4a9ae5)</p>
      </div>
      <div style="text-align:center">
        <img src="/favicon-white.svg" width="128" height="128">
        <p style="color:#666;margin-top:12px">White (#ffffff)</p>
      </div>
    </div>
    <div style="display:flex;gap:60px;align-items:center">
      <div style="text-align:center">
        <img src="/favicon.svg" width="32" height="32">
        <p style="color:#666;margin-top:8px;font-size:12px">32px (tab size)</p>
      </div>
      <div style="text-align:center">
        <img src="/favicon-white.svg" width="32" height="32">
        <p style="color:#666;margin-top:8px;font-size:12px">32px (tab size)</p>
      </div>
    </div>
  </div>
</body>
</html>
