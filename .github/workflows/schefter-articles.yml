name: Schefter Articles

on:
  schedule:
    # Tuesday 6am PT (13:00 UTC) — weekly-recap
    - cron: "0 13 * * 2"
    # Wednesday 10pm PT (05:00 UTC Thursday) — waiver-pickups
    - cron: "0 5 * * 4"
    # Friday 8am PT (15:00 UTC) — weekend-preview
    - cron: "0 15 * * 5"
    # Saturday 9am PT (16:00 UTC) — matchup-preview
    - cron: "0 16 * * 6"
    # Daily 8am PT (15:00 UTC) — cut-watch (self-guards to Jul 15–Aug 16)
    - cron: "0 15 * * *"
    # Wednesday 9am PT (16:00 UTC) — schedule-strength (The Gauntlet, both
    # leagues). 16:00 rather than 15:00 so the daily cut-watch mapping isn't
    # shadowed on Wednesdays.
    - cron: "0 16 * * 3"
  workflow_dispatch:
    inputs:
      type:
        description: "Article type to generate"
        required: true
        type: choice
        options:
          - weekly-recap
          - waiver-pickups
          - weekend-preview
          - matchup-preview
          - cut-watch
          - championship-recap
          - draft-grades
          - team-grades
          - schedule-strength
      week:
        description: "Override week number (optional)"
        required: false
        type: string

concurrency:
  group: schefter-articles
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Determine article type
        id: resolve
        env:
          INPUT_TYPE: ${{ github.event.inputs.type }}
          CRON_EXPR: ${{ github.event.schedule }}
        run: |
          if [ -n "$INPUT_TYPE" ]; then
            echo "type=$INPUT_TYPE" >> "$GITHUB_OUTPUT"
          else
            # Map the TRIGGERING cron expression (github.event.schedule) to an
            # article type. Never derive the type from wall-clock time — GitHub
            # schedule delays of 10-60 min are routine, and a delayed daily
            # 15:00 run crossing into 16:00 on a Wednesday would otherwise be
            # misrouted to schedule-strength instead of cut-watch.
            TYPE=""
            case "$CRON_EXPR" in
              "0 13 * * 2") TYPE="weekly-recap" ;;
              "0 16 * * 3") TYPE="schedule-strength" ;;
              "0 5 * * 4")  TYPE="waiver-pickups" ;;
              "0 15 * * 5") TYPE="weekend-preview" ;;
              "0 16 * * 6") TYPE="matchup-preview" ;;
              "0 15 * * *") TYPE="cut-watch" ;;
            esac
            echo "type=${TYPE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate article
        if: steps.resolve.outputs.type != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ARTICLE_TYPE: ${{ steps.resolve.outputs.type }}
          WEEK_OVERRIDE: ${{ github.event.inputs.week }}
          GROUPME_SCHEFTER_BOT_ID: ${{ secrets.GROUPME_SCHEFTER_BOT_ID }}
          GROUPME_AFL_SCHEFTER_BOT_ID: ${{ secrets.GROUPME_AFL_SCHEFTER_BOT_ID }}
        run: |
          WEEK_ARG=""
          if [ -n "$WEEK_OVERRIDE" ]; then
            WEEK_ARG="--week $WEEK_OVERRIDE"
          fi
          echo "Generating: $ARTICLE_TYPE"
          if [ "$ARTICLE_TYPE" = "schedule-strength" ]; then
            # The Gauntlet runs for BOTH leagues: compute fresh derived data
            # first (the article reads the derived JSON, never raw feeds), then
            # generate per league. GroupMe promo fires inside the script, only
            # when the feed write actually happened this run. A missing AFL
            # schedule/derived file skips AFL without failing TheLeague.
            #
            # Week semantics: the article runner's --week is the last COMPLETED
            # week; compute's --week is the GAUNTLET (upcoming) week = N+1. A
            # week override must reach BOTH scripts or the article looks for a
            # derived file compute never wrote.
            COMPUTE_WEEK_ARG=""
            if [ -n "$WEEK_OVERRIDE" ]; then
              COMPUTE_WEEK_ARG="--week $((WEEK_OVERRIDE + 1))"
            fi
            node scripts/compute-schedule-strength.mjs $COMPUTE_WEEK_ARG
            node scripts/schefter-weekly-articles.mjs --type "$ARTICLE_TYPE" --league theleague $WEEK_ARG
            node scripts/schefter-weekly-articles.mjs --type "$ARTICLE_TYPE" --league afl-fantasy $WEEK_ARG || echo "AFL generation failed (non-fatal)"
          else
            node scripts/schefter-weekly-articles.mjs --type "$ARTICLE_TYPE" $WEEK_ARG
          fi

      - name: Commit and push
        if: steps.resolve.outputs.type != ''
        env:
          ARTICLE_TYPE: ${{ steps.resolve.outputs.type }}
        run: |
          # schefter-feed.json is append-only and written by several workflows
          # on overlapping crons; a plain `git pull --rebase` collides on it
          # (merge=binary) and the push fails. commit-feed-and-push reconciles by
          # post id on top of the latest origin and retries. "Nothing changed"
          # is guarded inside the script.
          git config user.name "Schefter Bot"
          git config user.email "actions@users.noreply.github.com"
          FILES="src/data/theleague/schefter-feed.json"
          if [ "$ARTICLE_TYPE" = "schedule-strength" ]; then
            FILES="$FILES,data/afl-fantasy/schefter-feed.json,data/theleague/derived,data/afl-fantasy/derived"
          fi
          node scripts/commit-feed-and-push.mjs \
            --branch main \
            --message "chore: schefter article — $ARTICLE_TYPE" \
            --files "$FILES"
