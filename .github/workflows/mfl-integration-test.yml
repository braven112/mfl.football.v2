name: MFL Integration Test

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/utils/mfl-contract-writer.ts'
      - 'src/utils/contract-*.ts'
      - 'src/pages/api/contracts/**'
      - 'tests/mfl-write-integration.test.ts'
  schedule:
    # Daily canary — 7am PT (14:00 UTC) catches credential expiry or MFL API changes
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: mfl-integration-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need history for rollback job
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run MFL integration tests
        env:
          MFL_USER_ID: ${{ secrets.MFL_USER_ID }}
          MFL_IS_COMMISH: ${{ secrets.MFL_IS_COMMISH }}
          # Hardcoded to test league — safe to write/revert without affecting production
          MFL_LEAGUE_ID: '36189'
        run: pnpm test:mfl-integration

  rollback:
    needs: integration-test
    runs-on: ubuntu-latest
    # Only rollback on push to main (not PRs, cron, or manual runs)
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Get failed commit info
        id: commit-info
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' "$GH_SHA")
          COMMIT_AUTHOR=$(git log -1 --format='%an' "$GH_SHA")
          echo "message=$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "author=$COMMIT_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GH_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Revert the commit
        env:
          GH_SHA: ${{ github.sha }}
        run: |
          git config user.name "MFL Integration Bot"
          git config user.email "actions@users.noreply.github.com"
          git revert --no-edit "$GH_SHA"
          git push origin main

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        env:
          COMMIT_MSG: ${{ steps.commit-info.outputs.message }}
          COMMIT_AUTHOR: ${{ steps.commit-info.outputs.author }}
          SHORT_SHA: ${{ steps.commit-info.outputs.short_sha }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `MFL Integration Test Failed — auto-reverted ${process.env.SHORT_SHA}`,
              body: [
                `## MFL Contract Write Test Failed`,
                ``,
                `The integration test against test league 36189 failed after a push to main.`,
                `The commit has been **automatically reverted**.`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Commit | \`${context.sha}\` |`,
                `| Message | ${process.env.COMMIT_MSG} |`,
                `| Author | ${process.env.COMMIT_AUTHOR} |`,
                `| Workflow Run | [View logs](${runUrl}) |`,
                ``,
                `### Next Steps`,
                `1. Check the [workflow logs](${runUrl}) for the specific failure`,
                `2. Fix the issue on a branch`,
                `3. Open a PR — the integration test will run on the PR before merge`,
              ].join('\n'),
              labels: ['bug', 'mfl-integration'],
            });
