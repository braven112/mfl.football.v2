name: DEF Spotlight Sync

# Refreshes the marquee-defender pool for the Free Agents hero DEF spotlight
# (src/data/theleague/def-spotlight-players.json) so it always reflects current
# NFL rosters. Ranks each team's defenders by a playmaking-weighted production
# score from ESPN's per-athlete stats. To pause this job, comment out the cron
# line below (feature flags live in code, not GitHub variables — see CLAUDE.md).

on:
  schedule:
    # Every Wednesday at 6 AM PT (1 PM UTC) — after any Tuesday roster churn.
    - cron: "0 13 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-def-spotlight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Fetch top defenders per team
        run: node ./scripts/fetch-def-spotlight-players.mjs

      - name: Commit and push updates
        uses: ./.github/actions/commit-push
        with:
          check-paths: 'src/data/theleague/def-spotlight-players.json'
          add-paths: 'src/data/theleague/def-spotlight-players.json'
          commit-message: 'chore: refresh DEF spotlight marquee defenders'
          no-changes-message: 'No DEF spotlight changes to commit.'
          git-user-name: 'Stats Sync Bot'
