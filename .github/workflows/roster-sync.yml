name: Roster Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: roster-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.24.0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch MFL data (theleague)
        env:
          MFL_LEAGUE_ID: ${{ vars.MFL_LEAGUE_ID || '13522' }}
          MFL_LEAGUE_SLUG: theleague
          MFL_HOST: ${{ vars.MFL_HOST }}
          MFL_USERNAME: ${{ secrets.MFL_USERNAME }}
          MFL_PASSWORD: ${{ secrets.MFL_PASSWORD }}
          MFL_API_KEY: ${{ secrets.MFL_API_KEY }}
        run: node ./scripts/fetch-mfl-feeds.mjs --force

      - name: Update salary averages (theleague)
        env:
          MFL_LEAGUE_ID: ${{ vars.MFL_LEAGUE_ID || '13522' }}
          MFL_LEAGUE_SLUG: theleague
        run: node ./scripts/update-salary-averages.mjs

      # Note: draft-pick contract sync runs in its own workflow
      # (sync-draft-pick-contracts.yml), May-only cron, since the rookie
      # draft is the only window that needs it.

      - name: Fetch live NFL odds
        run: node ./scripts/fetch-live-odds.mjs

      - name: Fetch MFL data (afl)
        env:
          MFL_LEAGUE_ID: '19621'
          MFL_LEAGUE_SLUG: afl
          MFL_HOST: ${{ vars.MFL_HOST }}
          MFL_USERNAME: ${{ secrets.MFL_USERNAME }}
          MFL_PASSWORD: ${{ secrets.MFL_PASSWORD }}
          MFL_API_KEY: ${{ secrets.MFL_API_KEY }}
        run: node ./scripts/fetch-mfl-feeds.mjs --force

      - name: Commit and push updates
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No roster changes to commit."
            exit 0
          fi

          git config user.name "Roster Sync Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ src/data/
          git commit -m "chore: sync rosters and playoff data"
          git pull --rebase origin main
          git push
