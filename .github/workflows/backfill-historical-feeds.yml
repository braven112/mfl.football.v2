name: Backfill Historical MFL Feeds

# Manually-triggered one-off (or as-needed) backfill for missing/invalid
# historical seasons. Pulls every gap year listed in the current league.json's
# history.league array, then regenerates franchise-history.json and commits
# any resulting changes back to whatever branch the workflow was launched on.
#
# Run from the GitHub Actions UI, picking the branch you want to backfill
# (e.g. claude/fantasy-football-ideas-M2Ga7).
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Refetch every year, even ones already cached as valid'
        required: false
        default: 'false'

concurrency:
  group: backfill-historical-feeds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (current branch)
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Backfill historical feeds
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            node ./scripts/backfill-historical-feeds.mjs --force
          else
            node ./scripts/backfill-historical-feeds.mjs
          fi

      - name: Recompute franchise history
        run: node ./scripts/compute-franchise-history.mjs

      # schefter-feed.json picks up any new milestone posts emitted by
      # the compute step (Phase 5 — badge crossings auto-post).
      - name: Commit and push
        uses: ./.github/actions/commit-push
        with:
          add-paths: 'data/theleague/mfl-feeds/ data/theleague/derived/ src/data/theleague/schefter-feed.json'
          commit-message: 'chore: backfill historical MFL feeds + recompute franchise history'
          no-changes-message: 'No new historical data picked up — nothing to commit.'
          git-user-name: 'Historical Feed Backfill Bot'
          push-ref: ${{ github.ref_name }}
