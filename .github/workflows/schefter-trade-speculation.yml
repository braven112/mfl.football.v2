name: Schefter Trade Speculation

on:
  schedule:
    # Daily at 8pm UTC = 1pm Pacific. Two-team lane. NFL-calendar-aware
    # cadence (scripts/lib/speculation-cadence.mjs) decides whether to
    # actually post — the cron just gives the scanner a once-a-day chance.
    - cron: "0 20 * * *"
    # Monday at 7pm UTC = noon Pacific. Three-team blockbuster lane (Phase 3).
    # Detected via github.event.schedule so the same workflow file drives
    # both lanes — see the "Run speculation scanner" step.
    - cron: "0 19 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without mutating feed/ledger"
        required: false
        default: "false"
      mode:
        description: "Lane (two-team | three-team)"
        required: false
        default: "two-team"
        type: choice
        options:
          - two-team
          - three-team

concurrency:
  group: schefter-trade-speculation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  speculate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts || npm install --omit=dev --ignore-scripts

      - name: Refresh trade-bait feed
        env:
          MFL_LEAGUE_ID: "13522"
          MFL_LEAGUE_SLUG: theleague
        run: node scripts/fetch-trade-bait.mjs

      - name: Run speculation scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          GROUPME_SCHEFTER_BOT_ID: ${{ secrets.GROUPME_SCHEFTER_BOT_ID }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
          # The Monday-noon cron fires the three-team blockbuster lane; every
          # other trigger (daily 1pm cron, manual without override) defaults
          # to the two-team lane. workflow_dispatch can override via the
          # `mode` input.
          SCHEDULE_TRIGGER: ${{ github.event.schedule }}
          MODE_INPUT: ${{ github.event.inputs.mode }}
        run: |
          if [ -n "$MODE_INPUT" ]; then
            mode="$MODE_INPUT"
          elif [ "$SCHEDULE_TRIGGER" = "0 19 * * 1" ]; then
            mode="three-team"
          else
            mode="two-team"
          fi
          echo "Speculation lane: $mode"
          if [ "$DRY_RUN_INPUT" = "true" ]; then
            node scripts/schefter-trade-speculation.mjs --mode="$mode" --dry-run
          else
            node scripts/schefter-trade-speculation.mjs --mode="$mode"
          fi

      - name: Commit and push feed + ledger updates
        env:
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
          SCHEDULE_TRIGGER: ${{ github.event.schedule }}
        if: github.event.inputs.dry_run != 'true'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No speculation post produced."
            exit 0
          fi

          git config user.name "Schefter Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/theleague/schefter-feed.json data/theleague/derived/speculation-history.json data/theleague/mfl-feeds
          # Commit msg distinguishes the two lanes for git log readability;
          # falls back to the daily phrasing on manual runs.
          if [ "$SCHEDULE_TRIGGER" = "0 19 * * 1" ]; then
            commit_msg="chore: schefter speculation — Monday three-team blockbuster"
          else
            commit_msg="chore: schefter speculation — new trade speculation post"
          fi
          git commit -m "$commit_msg"
          git pull --rebase origin main
          git push
