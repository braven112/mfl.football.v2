name: Marquee Defenders Sync (yearly)

# Refreshes the Pro Bowl + All-Pro "always include" defender list
# (src/data/theleague/def-marquee-defenders.json) from Wikipedia, then rebuilds
# the DEF spotlight pool so the new stars are pinned to the front. The Pro Bowl /
# All-Pro classes turn over every year, so this runs once a year — after both are
# finalized (~early February). To pause, comment out the cron line (feature flags
# live in code, not GitHub variables — see CLAUDE.md).

on:
  schedule:
    # Feb 20 @ 6 AM PT (2 PM UTC) — after All-Pro (early Jan) and the Pro Bowl
    # Games (early Feb) are both finalized.
    - cron: "0 14 20 2 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-marquee-defenders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Refresh Pro Bowl / All-Pro defenders
        run: node ./scripts/fetch-marquee-defenders.mjs

      - name: Rebuild DEF spotlight pool with new stars pinned
        run: node ./scripts/fetch-def-spotlight-players.mjs

      - name: Commit and push updates
        uses: ./.github/actions/commit-push
        with:
          check-paths: 'src/data/theleague/def-marquee-defenders.json src/data/theleague/def-spotlight-players.json'
          add-paths: 'src/data/theleague/def-marquee-defenders.json src/data/theleague/def-spotlight-players.json'
          commit-message: 'chore: refresh Pro Bowl/All-Pro marquee defenders (yearly)'
          no-changes-message: 'No marquee/spotlight changes to commit.'
          git-user-name: 'Stats Sync Bot'
