name: Weekly Stats Sync

on:
  schedule:
    # Run every Tuesday at 6 AM PT (1 PM UTC) - after Monday Night Football
    - cron: "0 13 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-weekly-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Fetch fantasy points allowed
        run: node ./scripts/fetch-fantasy-points-allowed.mjs

      - name: Commit and push updates
        uses: ./.github/actions/commit-push
        with:
          add-paths: 'data/'
          commit-message: 'chore: update weekly fantasy points allowed stats'
          no-changes-message: 'No stats changes to commit.'
          git-user-name: 'Stats Sync Bot'
