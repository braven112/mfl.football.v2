name: Weekly Changelog Rollup

on:
  schedule:
    # Run every Monday at 8 PM PT (Tuesday 4 AM UTC)
    - cron: "0 4 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rollup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Run weekly changelog rollup
        run: node ./scripts/weekly-changelog-rollup.mjs

      - name: Commit and push updates
        uses: ./.github/actions/commit-push
        with:
          add-paths: 'src/data/whats-new.json src/data/weekly-changelog-staging.json'
          commit-message: 'chore: weekly changelog rollup'
          no-changes-message: 'No changelog changes to commit.'
          git-user-name: 'Changelog Bot'
