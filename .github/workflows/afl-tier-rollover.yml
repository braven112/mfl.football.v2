name: AFL Tier Rollover

# Recomputes the AFL all-play tier (Premier League / D-League) champions for the
# latest completed season and rolls promotion/relegation forward into next
# season's makeup (data/afl-fantasy/tier-history.json), then refreshes the
# trophy-wall tier champions in data/afl-fantasy/awards-history.json.
#
# Idempotent: the meaningful change lands once a season's week-17 (cutoff)
# all-play is final; every other run is a no-op and the commit guard skips it.
# Runs offline against the genuine 2024+ local feeds that Roster Sync keeps
# current, so no MFL credentials are needed.
#
# Schedule lives in code, per the repo rule (no GitHub Actions `vars.*` gates):
# to pause, comment out the cron line below; to change cadence, edit it here.

on:
  schedule:
    # Mondays 09:00 UTC. Weekly is plenty — tier makeup changes once a year.
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: afl-tier-rollover
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  rollover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Compute tier champions + roll makeup forward
        run: node ./scripts/compute-afl-tier-movement.mjs

      - name: Refresh trophy-wall tier champions
        run: node ./scripts/compute-afl-awards.mjs --offline

      - name: Commit and push updates
        uses: ./.github/actions/commit-push
        with:
          add-paths: 'data/afl-fantasy/tier-history.json data/afl-fantasy/awards-history.json'
          commit-message: 'chore(afl): roll tier makeup forward + refresh tier champions'
          no-changes-message: 'No tier rollover changes to commit.'
          git-user-name: 'AFL Tier Bot'
          pull-rebase: 'true'
